kind = "web"
previewPath = "/"
title = "Blog"
version = "1.0.0"
id = "artifacts/blog"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24722
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/blog run dev"

[services.env]
PORT = "24722"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/blog", "run", "build"]
publicDir = "artifacts/blog/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
